base.url=https://www.saucedemo.com
# Supported values: chrome (default) | firefox | edge | safari | ie
# chrome/firefox/edge auto-resolve their driver via Selenium Manager.
# safari uses the built-in macOS safaridriver (run `safaridriver --enable` once).
# ie requires IEDriverServer.exe on PATH — see README "Browser Support" section.
browser=chrome
headless=false
implicit.wait.seconds=2
explicit.wait.seconds=10

# Standard users provided by SauceDemo for functional/negative testing
user.standard=standard_user
user.locked=locked_out_user
user.problem=problem_user
user.glitch=performance_glitch_user
user.error=error_user
user.visual=visual_user
password.valid=secret_sauce
password.invalid=wrong_password_123
