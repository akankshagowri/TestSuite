name: Selenium BDD Regression

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

 -- name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
          java-version: '17'        # Changed from '11' to '17'
          distribution: 'temurin'
          cache: maven

      - name: Run smoke suite (fast PR gate)
        if: github.event_name == 'pull_request'
        run: mvn -B clean test -DsuiteXmlFile=testng-smoke.xml -Dheadless=true -Dsurefire.suiteXmlFiles=testng-smoke.xml

      - name: Run full regression suite
        if: github.event_name != 'pull_request'
        run: mvn -B clean test -Dheadless=true

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports/

      - name: Upload Surefire results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-results
          path: target/surefire-reports/
